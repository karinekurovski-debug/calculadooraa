<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Azul Fofa</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #edf7ff; /* Fundo azul bebê super clarinho */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background-color: #cce7ff; /* Azul Bebê principal */
            border: 4px solid #003366; /* Azul Marinho escuro */
            border-radius: 30px;
            box-shadow: 0px 8px 16px rgba(0, 51, 102, 0.2);
            padding: 25px;
            width: 320px;
        }

        #visor {
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border: 3px solid #80c0ff; /* Borda azul clara */
            border-radius: 15px;
            font-size: 28px;
            text-align: right;
            padding: 10px;
            color: #003366; /* Texto em Azul Marinho */
            margin-bottom: 20px;
            outline: none;
        }

        .teclado {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            height: 55px;
            border: none;
            border-radius: 18px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0px 4px 0px #99ccff; /* Efeito de sombra do botão fofo */
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Botões numéricos */
        .num {
            background-color: #f0f7ff;
            color: #003366;
            border: 2px solid #b3d7ff;
        }

        /* Operadores (Azul Marinho) */
        .op {
            background-color: #003366;
            color: white;
            box-shadow: 0px 4px 0px #001f40;
        }

        /* Limpar (C) */
        .limpar {
            background-color: #0088cc;
            color: white;
            box-shadow: 0px 4px 0px #005580;
        }

        /* Igual (=) */
        .igual {
            background-color: #80c0ff;
            color: white;
            box-shadow: 0px 4px 0px #003366;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="visor" readonly value="0">
        
        <div class="teclado">
            <button class="limpar" onclick="limpar()">C</button>
            <button class="op" onclick="inserir('/')">÷</button>
            <button class="op" onclick="inserir('*')">×</button>
            <button class="op" onclick="inserir('-')">-</button>

            <button class="num" onclick="inserir('7')">7</button>
            <button class="num" onclick="inserir('8')">8</button>
            <button class="num" onclick="inserir('9')">9</button>
            <button class="op" onclick="inserir('+')">+</button>

            <button class="num" onclick="inserir('4')">4</button>
            <button class="num" onclick="inserir('5')">5</button>
            <button class="num" onclick="inserir('6')">6</button>
            <button class="igual" style="grid-row: span 2; height: 122px;" onclick="calcular()">=</button>

            <button class="num" onclick="inserir('1')">1</button>
            <button class="num" onclick="inserir('2')">2</button>
            <button class="num" onclick="inserir('3')">3</button>

            <button class="num" style="grid-column: span 2;" onclick="inserir('0')">0</button>
            <button class="num" onclick="inserir('.')">,</button>
        </div>
    </div>

    <script>
        const visor = document.getElementById('visor');
        let operacaoAtual = '';

        function inserir(valor) {
            if (operacaoAtual === '' && valor !== '.') {
                if (['+', '-', '*', '/'].includes(valor)) {
                    operacaoAtual = '0' + valor;
                } else {
                    operacaoAtual = valor;
                }
            } else {
                operacaoAtual += valor;
            }
            atualizarVisor();
        }

        function limpar() {
            operacaoAtual = '';
            visor.value = '0';
        }

        function atualizarVisor() {
            if (operacaoAtual === '') {
                visor.value = '0';
            } else {
                let textoVisor = operacaoAtual.replace(/\*/g, '×').replace(/\//g, '÷');
                visor.value = textoVisor;
            }
        }

        function calcular() {
            try {
                if (operacaoAtual === '') return;
                
                let resultado = eval(operacaoAtual);
                
                if (resultado % 1 !== 0) {
                    resultado = parseFloat(resultado.toFixed(2));
                }
                
                operacaoAtual = resultado.toString();
                visor.value = operacaoAtual;
            } catch (error) {
                visor.value = 'Erro';
                operacaoAtual = '';
            }
        }
    </script>

</body>
</html>
